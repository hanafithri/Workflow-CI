name: CI Pipeline

on:
  push:
    branches:
      - main

jobs:
  build:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5

      with:
        python-version: "3.11"

    - name: Install Dependencies
      run: |
        pip install -r MLProject/requirements.txt

    - name: Run Model Training
      run: |
        cd MLProject
        python modelling.py
